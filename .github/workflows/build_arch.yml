name: Build Arch

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "OpenWrt target architecture"
        required: true
        default: "aarch64_cortex-a53"

jobs:
  build_arch:
    name: Build package for ${{ inputs.arch }}
    runs-on: ubuntu-22.04
    env:
      SDK_DIR: ${{ github.workspace }}/../sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        run: |
          version=$(cat frp.ver)
          echo "FRP_VERSION=$version" >> "$GITHUB_ENV"
          echo "FRP Version: $version"

      - name: Install build tools
        run: |
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
          echo "Installing build tools..."
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils python3-setuptools rsync swig unzip zlib1g-dev file wget xz-utils zstd gettext-base
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Resolve SDK URL
        run: |
          case "${{ inputs.arch }}" in
            amd64)
              echo "SDK_VER=22.03.2" >> "$GITHUB_ENV"
              echo "SDK_BASE_URL=https://archive.openwrt.org/releases/22.03.2/targets/x86/64" >> "$GITHUB_ENV"
              ;;
            aarch64_generic)
              echo "SDK_VER=22.03.2" >> "$GITHUB_ENV"
              echo "SDK_BASE_URL=https://archive.openwrt.org/releases/22.03.2/targets/rockchip/armv8" >> "$GITHUB_ENV"
              ;;
            aarch64_cortex-a53)
              echo "SDK_VER=22.03.2" >> "$GITHUB_ENV"
              echo "SDK_BASE_URL=https://archive.openwrt.org/releases/22.03.2/targets/mvebu/cortexa53" >> "$GITHUB_ENV"
              ;;
            aarch64_cortex-a72)
              echo "SDK_VER=22.03.2" >> "$GITHUB_ENV"
              echo "SDK_BASE_URL=https://archive.openwrt.org/releases/22.03.2/targets/mvebu/cortexa72" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported arch: ${{ inputs.arch }}" >&2
              exit 1
              ;;
          esac

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: cache-sdk
          key: openwrt-sdk-${{ env.SDK_VER }}-${{ inputs.arch }}-ipk

      - name: Download SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p cache-sdk
          cd cache-sdk
          sdk_file="$(wget -qO- "$SDK_BASE_URL/" | grep -oE 'openwrt-sdk-[^" ]+Linux-x86_64\.tar\.(xz|zst)' | head -n1)"
          if [ -z "$sdk_file" ]; then
            echo "Unable to resolve SDK filename from $SDK_BASE_URL/" >&2
            exit 1
          fi
          wget "$SDK_BASE_URL/$sdk_file"

      - name: Extract SDK
        run: |
          rm -rf "$SDK_DIR"
          mkdir -p "$SDK_DIR"
          file_name="$(find "$GITHUB_WORKSPACE/cache-sdk" -maxdepth 1 -type f \( -name 'openwrt-sdk-*.tar.xz' -o -name 'openwrt-sdk-*.tar.zst' \) -print | head -n1 | xargs basename)"
          if [ -z "$file_name" ]; then
            echo "SDK tarball not found in cache-sdk" >&2
            exit 1
          fi
          tarball_path="$GITHUB_WORKSPACE/cache-sdk/$file_name"
          if [[ "$file_name" == *.zst ]]; then
            tar --zstd -xf "$tarball_path" -C "$SDK_DIR" --strip-components=1
          else
            tar -xf "$tarball_path" -C "$SDK_DIR" --strip-components=1
          fi

      - name: Update feeds & install package
        run: |
          cd "$SDK_DIR"

          cp -f feeds.conf.default feeds.conf
          tmp="$(mktemp)"
          {
            echo "src-link frp $GITHUB_WORKSPACE"
            cat feeds.conf
          } > "$tmp"
          mv "$tmp" feeds.conf

          sed -i \
            -e 's|https://git.openwrt.org/openwrt/|https://github.com/openwrt/|g' \
            -e 's|https://git.openwrt.org/feed/|https://github.com/openwrt/|g' \
            -e 's|https://git.openwrt.org/project/|https://github.com/openwrt/|g' \
            feeds.conf

          sed -i \
            -e '/^src-git routing[[:space:]]/d' \
            -e '/^src-git telephony[[:space:]]/d' \
            -e '/^src-git video[[:space:]]/d' \
            feeds.conf

          ./scripts/feeds update -a
          echo "CONFIG_PACKAGE_frpc=m" > .config
          echo "CONFIG_PACKAGE_frps=m" >> .config
          ./scripts/feeds install -d n frpc
          ./scripts/feeds install -d n frps
          make defconfig
          make package/frpc/download -j8
          make package/frps/download -j8

      - name: Pre-generate configuration
        run: |
          cd "$SDK_DIR"
          echo "CONFIG_ALL_NONSHARED=n" > .config
          echo "CONFIG_ALL_KMODS=n" >> .config
          echo "CONFIG_ALL=n" >> .config
          echo "CONFIG_AUTOREMOVE=n" >> .config
          echo "CONFIG_SIGNED_PACKAGES=n" >> .config
          echo "CONFIG_PACKAGE_frpc=m" >> .config
          echo "CONFIG_PACKAGE_frps=m" >> .config
          make defconfig

      - name: Build package for ${{ inputs.arch }}
        run: |
          cd "$SDK_DIR"
          make package/frpc/{clean,compile} -j$(nproc) V=s
          make package/frps/{clean,compile} -j$(nproc) V=s

      - name: Collect bin packages for ${{ inputs.arch }}
        id: collect-bin
        run: |
          cd "$SDK_DIR"
          shopt -s nullglob
          files=(bin/packages/*/frp/frpc*.ipk bin/packages/*/frp/frps*.ipk)
          if [ ${#files[@]} -ne 2 ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "Expected 2 bin packages, found ${#files[@]}"
            find bin -type f -name "*.ipk" -print || true
            exit 0
          fi

          echo "has_files=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${files[@]}"

      - name: SSH session
        if: steps.collect-bin.outputs.has_files != 'true'
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
